- name: Apply headscale policy from planned draft
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Validate planned policy exists
      ansible.builtin.stat:
        path: /opt/headscale/planned/policy.next.json
      register: planned_policy

    - name: Abort when planned policy is missing
      ansible.builtin.fail:
        msg: /opt/headscale/planned/policy.next.json not found
      when: not planned_policy.stat.exists

    - name: Copy policy draft into container
      ansible.builtin.command: docker cp /opt/headscale/planned/policy.next.json headscale:/tmp/policy.next.json
      changed_when: true

    - name: Validate policy draft
      ansible.builtin.command: docker exec headscale headscale policy check -f /tmp/policy.next.json
      changed_when: false

    - name: Apply policy draft
      ansible.builtin.command: docker exec headscale headscale policy set -f /tmp/policy.next.json --force
      changed_when: true

    - name: Show active policy
      ansible.builtin.command: docker exec headscale headscale policy get -o json
      register: active_policy
      changed_when: false

    - name: Print active policy
      ansible.builtin.debug:
        var: active_policy.stdout_lines
