- name: Deploy downloads portal
  hosts: control_plane
  gather_facts: false
  vars:
    downloads_dir: /opt/headscale/downloads
  tasks:
    - name: Ensure downloads directory
      ansible.builtin.file:
        path: "{{ downloads_dir }}"
        state: directory
        mode: "0755"

    - name: Get default user ID
      ansible.builtin.shell: |
        docker exec headscale headscale users list -o json | python3 -c "
        import sys, json
        users = json.load(sys.stdin)
        for u in users:
            if u.get('name') == 'default':
                print(u['id'])
                break
        "
      args:
        executable: /bin/bash
      register: user_id
      changed_when: false

    - name: Generate reusable preauth key for portal scripts
      ansible.builtin.command: >
        docker exec headscale headscale preauthkeys create
        -u {{ user_id.stdout | trim }}
        --reusable --expiration 720h
      register: portal_key
      changed_when: true

    - name: Deploy portal templates
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "{{ downloads_dir }}/{{ item | basename | regex_replace('\\.j2$', '') }}"
        mode: "0755"
      with_fileglob:
        - "{{ playbook_dir }}/../../../assets/templates/downloads/*.j2"
      vars:
        linux_authkey: "{{ portal_key.stdout | trim }}"
        mac_authkey: "{{ portal_key.stdout | trim }}"
        win_authkey: "{{ portal_key.stdout | trim }}"
        login_server: "https://{{ headscale_domain }}"

    - name: List deployed portal files
      ansible.builtin.command: ls -la {{ downloads_dir }}/
      register: portal_files
      changed_when: false

    - name: Show portal files
      ansible.builtin.debug:
        var: portal_files.stdout_lines

    - name: Show portal key
      ansible.builtin.debug:
        msg: "Portal preauth key (720h): {{ portal_key.stdout | trim }}"

    - name: Reload Caddy to pick up changes
      ansible.builtin.shell: |
        docker compose -f /opt/headscale/docker-compose.yml exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || \
        docker compose -f /opt/headscale/docker-compose.yml restart caddy
      args:
        executable: /bin/bash
      changed_when: true
